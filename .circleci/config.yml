version: 2.1

defaults: &defaults
  working_directory: ~/repo
  environment:
    LC_ALL: C.UTF-8

install_hex_rebar: &install_hex_rebar
  run:
    name: Install hex and rebar
    command: |
      mix local.hex --force
      mix local.rebar --force

install_system_deps: &install_system_deps
  run:
    name: Install system dependencies
    command: |
      apk add build-base

jobs:
  lint:
    parameters:
      image-tag:
        description: "Docker image tag"
        type: string
    docker:
      - image: hexpm/elixir:<< parameters.image-tag >>
    <<: *defaults
    steps:
      - checkout
      - <<: *install_hex_rebar
      - <<: *install_system_deps
      - restore_cache:
          keys:
            - v1-mix-cache-<< parameters.image-tag >>-{{ .Branch }}-{{ checksum "mix.lock" }}
            - v1-mix-cache-<< parameters.image-tag >>-{{ .Branch }}-
            - v1-mix-cache-<< parameters.image-tag >>
      - run: mix do deps.get, compile --warnings-as-errors, deps.unlock --check-unused
      - run: mix format --check-formatted
      - run: mix docs
      - run: mix hex.build
      - run: MIX_ENV=test mix credo -a
      - run: mix dialyzer
      - save_cache:
          key: v1-mix-cache-<< parameters.image-tag >>-{{ .Branch }}-{{ checksum "mix.lock" }}
          paths:
            - _build
            - deps

  test:
    parameters:
      image-tag:
        description: "Docker image tag"
        type: string
    docker:
      - image: hexpm/elixir:<< parameters.image-tag >>
    <<: *defaults
    steps:
      - checkout
      - <<: *install_hex_rebar
      - <<: *install_system_deps
      - restore_cache:
          keys:
            - v1-mix-cache-<< parameters.image-tag >>-{{ .Branch }}-{{ checksum "mix.lock" }}
            - v1-mix-cache-<< parameters.image-tag >>-{{ .Branch }}-
            - v1-mix-cache-<< parameters.image-tag >>
      - run: mix do deps.get, compile --warnings-as-errors
      - run: mix test --include inclusion --include integration --include firmware_update
      - save_cache:
          key: v1-mix-cache-<< parameters.image-tag >>-{{ .Branch }}-{{ checksum "mix.lock" }}
          paths:
            - _build
            - deps

workflows:
  version: 2
  build_test:
    jobs:
      - lint:
          image-tag: 1.14.0-erlang-25.1-alpine-3.15.6
      - test:
          matrix:
            parameters:
              image-tag:
                - 1.14.0-erlang-25.1-alpine-3.15.6
                - 1.13.3-erlang-24.2.2-alpine-3.15.0
                - 1.12.1-erlang-24.0.2-alpine-3.13.3
                - 1.11.3-erlang-23.2.2-alpine-3.12.1
                - 1.10.4-erlang-23.1.2-alpine-3.12.1
